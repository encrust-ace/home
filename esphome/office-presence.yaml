esphome:
  name: office-presence
  friendly_name: "Office Presence"

esp32:
  variant: esp32c3
  framework: 
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  ap:
    ssid: "Office Presence"
    password: "12345678"

logger:
  level: INFO
api:
ota:
  - platform: esphome
captive_portal:
web_server:
debug:

uart:
  id: uart_bus
  tx_pin: GPIO7
  rx_pin: GPIO6
  baud_rate: 115200

ld2420:
  - uart_id: uart_bus

# ========== SENSORS ==========

sensor:
  - platform: wifi_signal
    name: "WiFi Signal (dBm)"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    unit_of_measurement: s
    entity_category: diagnostic

  - platform: debug
    free:
      name: "Available Heap"

  - platform: ld2420
    moving_distance:
      name: "Moving Distance"
      id: dist_cm

text_sensor:
  - platform: wifi_info
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic

  - platform: ld2420
    fw_version:
      name: "LD2420 Firmware"

binary_sensor:
  - platform: ld2420
    has_target:
      name: "Presence"
      id: radar_target

select:
  - platform: ld2420
    operating_mode:
      name: "Operating Mode"

number:
  - platform: ld2420
    presence_timeout:
      name: "Presence Timeout"
    min_gate_distance:
      name: "Min Gate"
    max_gate_distance:
      name: "Max Gate"
    gate_select:
      name: "Gate to Config"
    still_threshold:
      name: "Still Threshold Value"
    move_threshold:
      name: "Move Threshold Value"

button:
  - platform: ld2420
    apply_config:
      name: "Apply Config"
    factory_reset:
      name: "Factory Reset"
    revert_config:
      name: "Undo Edits"

  - platform: restart
    name: "Restart"
    entity_category: diagnostic
